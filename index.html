<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Школьный помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        body {
            background: #0e1621;
            color: #eef4ff;
            min-height: 100vh;
            padding: 16px 16px 40px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
        }
        h1 {
            font-size: 1.8rem;
            background: linear-gradient(135deg, #C0E0FF, #7CB9FF);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            text-align: center;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            color: #8e9eae;
            margin-bottom: 24px;
            font-size: 0.9rem;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            margin-bottom: 24px;
        }
        .card {
            background: #1f2c38;
            border-radius: 20px;
            padding: 20px 12px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid #2b3b4c;
        }
        .card:active {
            background: #2a3a4a;
            transform: scale(0.98);
        }
        .card-icon {
            font-size: 2.2rem;
            margin-bottom: 8px;
        }
        .card-title {
            font-weight: 600;
            font-size: 1rem;
        }
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }
        .modal.show {
            display: flex;
        }
        .modal-content {
            background: #17212b;
            border-radius: 28px;
            padding: 24px;
            max-width: 400px;
            width: 100%;
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .modal-title {
            font-size: 1.3rem;
            font-weight: 600;
        }
        .close-btn {
            background: none;
            border: none;
            color: #8e9eae;
            font-size: 1.5rem;
            cursor: pointer;
        }
        .modal-image {
            width: 100%;
            border-radius: 16px;
            margin-bottom: 16px;
        }
        .input-field {
            width: 100%;
            background: #0e1621;
            border: 1px solid #2b3b4c;
            border-radius: 16px;
            padding: 14px 16px;
            color: white;
            font-size: 1rem;
            margin-bottom: 16px;
        }
        .btn {
            background: #2b9aff;
            border: none;
            border-radius: 16px;
            padding: 14px;
            color: white;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #2b9aff;
            color: #2b9aff;
        }
        .admin-link {
            text-align: center;
            margin-top: 30px;
        }
        .admin-link span {
            color: #4a6a8a;
            font-size: 1.5rem;
            cursor: pointer;
            opacity: 0.4;
        }
        .footer-note {
            text-align: center;
            margin-top: 20px;
            color: #6c86a3;
            font-size: 0.75rem;
        }
        .user-bar {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 8px;
        }
        .admin-badge {
            background: #1f2c38;
            color: #8e9eae;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.7rem;
            border: 1px solid #2b3b4c;
        }
    </style>
</head>
<body>
<div class="container">
    <h1>🏫 Школьный помощник</h1>
    <div class="subtitle">Всё для учёбы в одном месте</div>
    
    <div class="user-bar" id="userBar">
        <span class="admin-badge" id="adminBadge" style="display: none;">👑 @Maksikrue</span>
    </div>

    <!-- Главный экран -->
    <div id="mainScreen">
        <div class="grid">
            <div class="card" onclick="showSection('schedule')">
                <div class="card-icon">📅</div>
                <div class="card-title">Расписание</div>
            </div>
            <div class="card" onclick="showSection('clubs')">
                <div class="card-icon">🎨</div>
                <div class="card-title">Кружки</div>
            </div>
            <div class="card" onclick="showSection('menu')">
                <div class="card-icon">🍽</div>
                <div class="card-title">Меню</div>
            </div>
            <div class="card" onclick="showSection('events')">
                <div class="card-icon">📢</div>
                <div class="card-title">События</div>
            </div>
            <div class="card" onclick="showSection('map')">
                <div class="card-icon">🗺</div>
                <div class="card-title">Карта</div>
            </div>
            <div class="card" onclick="showSection('meetings')">
                <div class="card-icon">👨‍👩‍👧</div>
                <div class="card-title">Собрания</div>
            </div>
        </div>
    </div>

    <!-- Модалка контента -->
    <div class="modal" id="contentModal" onclick="if(event.target === this) closeModal()">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">Раздел</span>
                <button class="close-btn" onclick="closeModal()">✕</button>
            </div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- Модалка входа в админку -->
    <div class="modal" id="adminLoginModal" onclick="if(event.target === this) closeAdminLoginModal()">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title">⚙️ Вход</span>
                <button class="close-btn" onclick="closeAdminLoginModal()">✕</button>
            </div>
            <input type="password" id="adminPasswordInput" class="input-field" placeholder="Пароль">
            <button class="btn" onclick="loginAsAdmin()">Войти</button>
        </div>
    </div>

    <!-- Админ-панель -->
    <div id="adminPanel" style="display: none; margin-top: 24px; padding: 20px; background: #1a2530; border-radius: 20px;">
        <h3>⚙️ Панель управления</h3>
        <p style="margin: 16px 0; color: #4bcb6e;">👋 Привет, @Maksikrue</p>
        
        <h4>📅 Загрузить картинку</h4>
        <select id="sectionSelect" class="input-field">
            <option value="schedule">Расписание</option>
            <option value="clubs">Кружки</option>
            <option value="menu">Меню</option>
            <option value="map">Карта</option>
        </select>
        <input type="file" id="imageUpload" accept="image/*" class="input-field">
        <button class="btn" onclick="uploadImage()" style="margin-bottom: 16px;">Загрузить</button>
        
        <h4>📝 Текст событий и собраний</h4>
        <select id="textSectionSelect" class="input-field">
            <option value="events">События</option>
            <option value="meetings">Собрания</option>
        </select>
        <textarea id="textContentInput" class="input-field" rows="4" placeholder="Введите текст..."></textarea>
        <button class="btn" onclick="saveText()">Сохранить текст</button>
        
        <button class="btn-outline" onclick="closeAdminPanel()" style="margin-top: 20px;">Закрыть</button>
    </div>
    
    <div class="admin-link">
        <span id="gearBtn" onclick="showAdminLogin()" style="display: none;">⚙️</span>
    </div>
    <div class="footer-note">🐋 Школьный помощник · v2.0</div>
</div>

<script>
    const ADMIN_USERNAME = "Maksikrue";
    const ADMIN_PASSWORD = "MaximAdmin2024";
    const BOT_TOKEN = "8637559726:AAEcA1EgeUDQUYAt9PnPC4T9Zpagy4_cf1w";
    const YOUR_CHAT_ID = "ТВОЙ_CHAT_ID"; // Замени на свой Telegram ID
    
    let tg = window.Telegram.WebApp;
    let currentUser = null;
    let isAdmin = false;
    
    // Данные разделов (хранятся в localStorage)
    let sections = {
        schedule: { type: 'image', content: null },
        clubs: { type: 'image', content: null },
        menu: { type: 'image', content: null },
        events: { type: 'text', content: 'Пока нет важных событий' },
        map: { type: 'image', content: null },
        meetings: { type: 'text', content: 'Пока нет информации о собраниях' }
    };
    
    tg.ready();
    tg.expand();
    
    function init() {
        // Загружаем сохранённые данные
        const saved = localStorage.getItem('school_sections');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                sections = { ...sections, ...parsed };
            } catch(e) {}
        }
        
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            currentUser = tg.initDataUnsafe.user;
            if (currentUser.username === ADMIN_USERNAME) {
                document.getElementById('adminBadge').style.display = 'inline-block';
                isAdmin = true;
                document.getElementById('gearBtn').style.display = 'inline';
            } else {
                // Если ник не совпал, показываем шестерёнку для ручного входа
                document.getElementById('gearBtn').style.display = 'inline';
            }
        } else {
            document.getElementById('gearBtn').style.display = 'inline';
        }
    }
    
    function showSection(key) {
        const titles = {
            schedule: '📅 Расписание уроков',
            clubs: '🎨 Расписание кружков',
            menu: '🍽 Меню столовой',
            events: '📢 Важные события',
            map: '🗺 Карта школы',
            meetings: '👨‍👩‍👧 Родительские собрания'
        };
        document.getElementById('modalTitle').innerText = titles[key];
        const body = document.getElementById('modalBody');
        const section = sections[key];
        
        if (section.type === 'image' && section.content) {
            body.innerHTML = `<img src="${section.content}" class="modal-image" onerror="this.src='https://placehold.co/600x400/1f2c38/8e9eae?text=Картинка+не+загружена'">`;
        } else if (section.type === 'text' && section.content) {
            body.innerHTML = `<p style="line-height: 1.6;">${escapeHtml(section.content)}</p>`;
        } else {
            body.innerHTML = `<p style="color: #8e9eae; text-align: center; padding: 20px;">Пока нет информации</p>`;
        }
        document.getElementById('contentModal').classList.add('show');
    }
    
    function closeModal() {
        document.getElementById('contentModal').classList.remove('show');
    }
    
    function showAdminLogin() {
        document.getElementById('adminLoginModal').classList.add('show');
    }
    
    function closeAdminLoginModal() {
        document.getElementById('adminLoginModal').classList.remove('show');
    }
    
    async function sendLoginNotification() {
        const message = `🔔 Вход в админ-панель Школьного помощника.\n👤 Пользователь: ${currentUser?.first_name || 'Неизвестный'}\n📱 Время: ${new Date().toLocaleString('ru')}`;
        try {
            await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ chat_id: YOUR_CHAT_ID, text: message })
            });
        } catch(e) {}
    }
    
    async function loginAsAdmin() {
        const pwd = document.getElementById('adminPasswordInput').value;
        if (pwd === ADMIN_PASSWORD) {
            isAdmin = true;
            closeAdminLoginModal();
            document.getElementById('adminPanel').style.display = 'block';
            document.getElementById('adminBadge').style.display = 'inline-block';
            document.getElementById('adminPasswordInput').value = '';
            await sendLoginNotification();
        } else {
            alert('Неверный пароль');
        }
    }
    
    function closeAdminPanel() {
        document.getElementById('adminPanel').style.display = 'none';
    }
    
    function uploadImage() {
        if (!isAdmin) { alert('Нет доступа'); return; }
        const section = document.getElementById('sectionSelect').value;
        const file = document.getElementById('imageUpload').files[0];
        if (!file) { alert('Выберите файл'); return; }
        
        const reader = new FileReader();
        reader.onload = function(e) {
            sections[section] = { type: 'image', content: e.target.result };
            localStorage.setItem('school_sections', JSON.stringify(sections));
            alert('✅ Картинка сохранена!');
            document.getElementById('imageUpload').value = '';
        };
        reader.readAsDataURL(file);
    }
    
    function saveText() {
        if (!isAdmin) { alert('Нет доступа'); return; }
        const section = document.getElementById('textSectionSelect').value;
        const text = document.getElementById('textContentInput').value.trim();
        if (!text) { alert('Введите текст'); return; }
        
        sections[section] = { type: 'text', content: text };
        localStorage.setItem('school_sections', JSON.stringify(sections));
        alert('✅ Текст сохранён!');
        document.getElementById('textContentInput').value = '';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }
    
    init();
</script>
</body>
</html>
