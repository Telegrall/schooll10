<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Школьный помощник</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
        body { background:#0e1621; color:#eef4ff; min-height:100vh; padding:16px; }
        .container { max-width:600px; margin:0 auto; }
        h1 { font-size:1.8rem; background:linear-gradient(135deg, #C0E0FF, #7CB9FF); -webkit-background-clip:text; color:transparent; text-align:center; margin-bottom:8px; }
        .card { background:#1f2c38; border-radius:20px; padding:20px; margin-bottom:16px; border:1px solid #2b3b4c; }
        .btn { background:#2b9aff; border:none; border-radius:16px; padding:14px; color:white; font-weight:600; cursor:pointer; width:100%; margin-top:12px; }
        .btn-outline { background:transparent; border:1px solid #2b9aff; color:#2b9aff; }
        .input-field { width:100%; background:#0e1621; border:1px solid #2b3b4c; border-radius:16px; padding:14px; color:white; margin-bottom:12px; }
        .hidden { display:none !important; }
        .badge { background:#2b9aff; padding:4px 10px; border-radius:20px; font-size:0.8rem; margin-left:8px; }
        .request-item { background:#17212b; border-radius:16px; padding:16px; margin-bottom:12px; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); display:flex; align-items:center; justify-content:center; padding:16px; z-index:1000; }
        .modal-content { background:#17212b; border-radius:28px; padding:24px; max-width:500px; width:100%; max-height:80vh; overflow-y:auto; }
    </style>
</head>
<body>
<div class="container" id="app">
    <!-- ЭКРАН ВХОДА / РЕГИСТРАЦИИ -->
    <div id="loginScreen">
        <h1>🏫 Школьный помощник</h1>
        <div class="card">
            <input type="text" id="loginNickname" class="input-field" placeholder="Ваш никнейм">
            <button class="btn" id="checkNicknameBtn">Продолжить</button>
        </div>
    </div>

    <!-- ЭКРАН РЕГИСТРАЦИИ НОВОГО ПОЛЬЗОВАТЕЛЯ -->
    <div id="registerScreen" class="hidden">
        <h1>📝 Регистрация</h1>
        <div class="card">
            <input type="text" id="regFullName" class="input-field" placeholder="ФИО полностью">
            <input type="number" id="regAge" class="input-field" placeholder="Возраст">
            <button class="btn" id="submitRegisterBtn">Отправить заявку</button>
            <button class="btn-outline" id="backToLoginBtn">← Назад</button>
        </div>
    </div>

    <!-- ЭКРАН ОЖИДАНИЯ (СТАТУС: НА ПРОВЕРКЕ) -->
    <div id="pendingScreen" class="hidden">
        <h1>⏳ Заявка на рассмотрении</h1>
        <div class="card">
            <p>Ваши данные отправлены администратору.</p>
            <p>После одобрения вы получите доступ к чатам.</p>
            <button class="btn-outline" id="logoutFromPendingBtn">Выйти</button>
        </div>
    </div>

    <!-- ГЛАВНЫЙ ЭКРАН (ДЛЯ ОДОБРЕННЫХ) -->
    <div id="mainScreen" class="hidden">
        <h1>🏫 Школьный помощник</h1>
        <div class="subtitle">
            <span id="displayNickname"></span>
            <span id="adminBadge" class="badge hidden">👑 @Maksikrue</span>
            <span id="teacherBadge" class="badge hidden">👩‍🏫 Учитель</span>
        </div>
        
        <div class="card">
            <h3>📅 Разделы</h3>
            <button class="btn-outline" id="btnSchedule">📅 Расписание</button>
            <button class="btn-outline" id="btnMenu">🍽 Меню</button>
        </div>

        <div class="card">
            <h3>💬 Чаты</h3>
            <button class="btn-outline" id="btnParentChat">👨‍👩‍👧 Родительский чат</button>
            <button class="btn-outline" id="btnTeacherChat">👩‍🏫 Чат учителей</button>
        </div>

        <!-- АДМИН-ПАНЕЛЬ (только @Maksikrue) -->
        <div id="adminPanel" class="card hidden">
            <h3>⚙️ Админ-панель</h3>
            <button class="btn" id="btnShowRequests">📬 Заявки на вступление</button>
        </div>

        <button class="btn-outline" id="logoutBtn">🚪 Выйти</button>
    </div>

    <!-- МОДАЛКА: ЗАЯВКИ -->
    <div id="requestsModal" class="modal hidden">
        <div class="modal-content">
            <h3>📬 Заявки на вступление</h3>
            <div id="requestsList"></div>
            <button class="btn-outline" id="closeRequestsModal">Закрыть</button>
        </div>
    </div>
</div>

<script>
    const SUPABASE_URL = "https://iiuahjmpszfcgtwapidt.supabase.co";
    const SUPABASE_KEY = "sb_publishable_iFYpqkv4D0qEOj4Dn1X9Nw_OH9d5Bji";
    const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    
    const ADMIN_NICK = "Maksikrue";
    let tg = window.Telegram.WebApp;
    let currentUser = null;
    
    tg.ready();
    tg.expand();
    
    // Элементы экранов
    const loginScreen = document.getElementById('loginScreen');
    const registerScreen = document.getElementById('registerScreen');
    const pendingScreen = document.getElementById('pendingScreen');
    const mainScreen = document.getElementById('mainScreen');
    const requestsModal = document.getElementById('requestsModal');
    
    // Кнопки
    document.getElementById('checkNicknameBtn').addEventListener('click', checkNickname);
    document.getElementById('submitRegisterBtn').addEventListener('click', registerUser);
    document.getElementById('backToLoginBtn').addEventListener('click', () => {
        registerScreen.classList.add('hidden');
        loginScreen.classList.remove('hidden');
    });
    document.getElementById('logoutFromPendingBtn').addEventListener('click', logout);
    document.getElementById('logoutBtn').addEventListener('click', logout);
    document.getElementById('btnShowRequests').addEventListener('click', showRequests);
    document.getElementById('closeRequestsModal').addEventListener('click', () => requestsModal.classList.add('hidden'));
    
    // Заглушки для кнопок разделов
    document.getElementById('btnSchedule').addEventListener('click', () => alert('📅 Расписание скоро появится'));
    document.getElementById('btnMenu').addEventListener('click', () => alert('🍽 Меню скоро появится'));
    document.getElementById('btnParentChat').addEventListener('click', () => alert('💬 Чат откроется после одобрения'));
    document.getElementById('btnTeacherChat').addEventListener('click', () => alert('💬 Чат откроется после одобрения'));
    
    async function checkNickname() {
        const nickname = document.getElementById('loginNickname').value.trim();
        if (!nickname) return alert('Введите никнейм');
        
        const { data, error } = await sb.from('school_users').select('*').eq('nickname', nickname).single();
        
        if (data) {
            currentUser = data;
            if (data.status === 'approved') {
                showMainScreen();
            } else if (data.status === 'pending') {
                showPendingScreen();
            } else if (data.status === 'banned') {
                alert('⛔ Ваш аккаунт заблокирован');
            }
        } else {
            // Новый пользователь
            document.getElementById('regFullName').value = '';
            document.getElementById('regAge').value = '';
            loginScreen.classList.add('hidden');
            registerScreen.classList.remove('hidden');
        }
    }
    
    async function registerUser() {
        const nickname = document.getElementById('loginNickname').value.trim();
        const fullName = document.getElementById('regFullName').value.trim();
        const age = document.getElementById('regAge').value;
        
        if (!fullName || !age) return alert('Заполните все поля');
        
        const { error } = await sb.from('school_users').insert({
            nickname: nickname,
            full_name: fullName,
            age: parseInt(age),
            status: 'pending',
            role: 'parent'
        });
        
        if (error) {
            alert('Ошибка: ' + error.message);
        } else {
            registerScreen.classList.add('hidden');
            showPendingScreen();
        }
    }
    
    function showPendingScreen() {
        loginScreen.classList.add('hidden');
        registerScreen.classList.add('hidden');
        mainScreen.classList.add('hidden');
        pendingScreen.classList.remove('hidden');
    }
    
    function showMainScreen() {
        loginScreen.classList.add('hidden');
        registerScreen.classList.add('hidden');
        pendingScreen.classList.add('hidden');
        mainScreen.classList.remove('hidden');
        
        document.getElementById('displayNickname').innerText = currentUser.nickname;
        
        if (currentUser.nickname === ADMIN_NICK) {
            document.getElementById('adminBadge').classList.remove('hidden');
            document.getElementById('adminPanel').classList.remove('hidden');
        }
        if (currentUser.role === 'teacher') {
            document.getElementById('teacherBadge').classList.remove('hidden');
        }
    }
    
    function logout() {
        currentUser = null;
        document.getElementById('loginNickname').value = '';
        loginScreen.classList.remove('hidden');
        registerScreen.classList.add('hidden');
        pendingScreen.classList.add('hidden');
        mainScreen.classList.add('hidden');
    }
    
    async function showRequests() {
        if (currentUser.nickname !== ADMIN_NICK) return;
        
        const { data } = await sb.from('school_users').select('*').eq('status', 'pending');
        const list = document.getElementById('requestsList');
        
        if (!data || data.length === 0) {
            list.innerHTML = '<p>Нет новых заявок</p>';
        } else {
            list.innerHTML = data.map(u => `
                <div class="request-item">
                    <b>${u.nickname}</b><br>
                    ${u.full_name}, ${u.age} лет<br>
                    <button onclick="approveUser(${u.id})" class="btn" style="margin-top:8px;">✅ Одобрить</button>
                    <button onclick="banUser(${u.id})" class="btn-outline" style="margin-top:8px;">⛔ Забанить</button>
                </div>
            `).join('');
        }
        requestsModal.classList.remove('hidden');
    }
    
    window.approveUser = async (id) => {
        await sb.from('school_users').update({ status: 'approved' }).eq('id', id);
        alert('Одобрено');
        showRequests();
    };
    
    window.banUser = async (id) => {
        await sb.from('school_users').update({ status: 'banned' }).eq('id', id);
        alert('Забанено');
        showRequests();
    };
</script>
</body>
</html>
